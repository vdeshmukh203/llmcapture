<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="header-title">
        <div class="logo">
          <img src="icons/icon128.png" width="24" height="24" alt="logo" style="border-radius:4px;display:block;">
        </div>
        <h1>AI Chat Capture</h1>
      </div>
      <div class="version">v12.0</div>
    </header>

    <section class="status-section">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span id="captureStatus" class="status-badge status-inactive">Inactive</span>
      </div>
      <div class="status-row">
        <span class="status-label">Platform</span>
        <span id="platformName" class="platform-name">-</span>
      </div>
      <div class="status-row">
        <span class="status-label">Messages</span>
        <span id="messageCount" class="message-count">0</span>
      </div>
      <div class="status-row">
        <span class="status-label">Prompts</span>
        <span id="promptCount" class="message-count">0</span>
      </div>
      <div class="status-row">
        <span class="status-label">Max Turns</span>
        <span id="maxTurnsDisplay" class="message-count">50</span>
      </div>
      <div class="status-row">
        <span class="status-label">Session</span>
        <span id="sessionId" class="session-id">-</span>
      </div>
      <div class="status-row">
        <span class="status-label">Lock Reason</span>
        <span id="lockReason" class="platform-name">-</span>
      </div>
      <div class="status-row status-row-wide">
        <span class="status-label">Active Tab</span>
        <span id="activeTabUrl" class="url-text">-</span>
      </div>
    </section>

    <section class="controls-section">
      <div class="toggle-row">
        <label for="captureToggle">Capture Enabled</label>
        <input type="checkbox" id="captureToggle" checked>
      </div>
      <div class="toggle-row">
        <label for="rawInputToggle">Capture Raw Input</label>
        <input type="checkbox" id="rawInputToggle" checked>
      </div>
      <div class="toggle-row compact-row">
        <label for="autoRefreshToggle">Auto Refresh Status</label>
        <input type="checkbox" id="autoRefreshToggle" checked>
      </div>
      <div class="toggle-row compact-row">
        <label for="maxTurnsInput">Max Turns</label>
        <div class="max-turns-row">
          <input type="number" id="maxTurnsInput" class="max-turns-input" min="1" max="9999" value="50">
          <button id="setMaxTurns" class="btn btn-secondary btn-small">Set</button>
        </div>
      </div>
      <div class="button-row">
        <button id="refreshStatus" class="btn btn-secondary btn-half">Refresh</button>
        <button id="forceCapture" class="btn btn-secondary btn-half">Force Capture</button>
      </div>
      <button id="initCapture" class="btn btn-primary">Initialize &amp; Verify</button>
      <div id="preCheckPanel" class="precheck-panel hidden"></div>
    </section>

    <section class="sessions-section">
      <h2>Saved Sessions</h2>
      <div id="sessionList" class="session-list">
        <div class="empty-state">No sessions yet</div>
      </div>
    </section>

    <section class="actions-section">
      <button id="exportAll" class="btn btn-primary">Export All Sessions</button>
      <button id="verifyAll" class="btn btn-secondary">Verify Integrity</button>
      <button id="clearAll" class="btn btn-danger">Clear All</button>
    </section>

    <div id="verifyModal" class="modal hidden">
      <div class="modal-content">
        <h3>Chain Integrity Report</h3>
        <div id="verifyResults" class="verify-results"></div>
        <button id="closeModal" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="lib/crypto.js"></script>
  <script src="lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
